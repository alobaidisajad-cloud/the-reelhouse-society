<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>The ReelHouse Society — Poster</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
  @page { size: 1080px 1080px; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #0B0A08;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Aged paper border effect */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 28px solid transparent;
    border-image: linear-gradient(
      135deg,
      rgba(196,150,26,0.12) 0%,
      rgba(196,150,26,0.04) 20%,
      transparent 40%,
      rgba(196,150,26,0.06) 60%,
      rgba(196,150,26,0.15) 80%,
      rgba(196,150,26,0.08) 100%
    ) 1;
    z-index: 2;
    pointer-events: none;
  }

  /* Film grain overlay */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
  }

  /* Scratches */
  .scratches {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    opacity: 0.08;
  }
  .scratch {
    position: absolute;
    background: #C4961A;
    border-radius: 50%;
  }
  .scratch-1 { width: 1px; height: 180px; top: 10%; left: 23%; transform: rotate(2deg); }
  .scratch-2 { width: 1px; height: 240px; top: 5%; left: 71%; transform: rotate(-1deg); }
  .scratch-3 { width: 1px; height: 120px; top: 40%; left: 45%; transform: rotate(3deg); }
  .scratch-4 { width: 2px; height: 60px; top: 70%; left: 15%; transform: rotate(-2deg); opacity: 0.5; }
  .scratch-5 { width: 1px; height: 300px; top: 0%; left: 88%; transform: rotate(1deg); opacity: 0.4; }

  /* Corner wear */
  .corner-wear {
    position: absolute;
    z-index: 3;
    pointer-events: none;
  }
  .corner-wear--tl {
    top: 0; left: 0;
    width: 120px; height: 120px;
    background: radial-gradient(circle at 0% 0%, rgba(43,33,24,0.5) 0%, transparent 70%);
  }
  .corner-wear--br {
    bottom: 0; right: 0;
    width: 150px; height: 150px;
    background: radial-gradient(circle at 100% 100%, rgba(43,33,24,0.6) 0%, transparent 70%);
  }
  .corner-wear--tr {
    top: 0; right: 0;
    width: 100px; height: 100px;
    background: radial-gradient(circle at 100% 0%, rgba(43,33,24,0.4) 0%, transparent 70%);
  }

  /* Ink stain */
  .ink-stain {
    position: absolute;
    bottom: 12%;
    right: 8%;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, rgba(107,26,10,0.15) 0%, transparent 70%);
    border-radius: 40% 60% 50% 40%;
    z-index: 3;
    pointer-events: none;
  }

  .poster-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
    z-index: 4;
    padding: 60px 80px;
    width: 100%;
    height: 100%;
  }

  /* Top ornamental line */
  .ornament-top {
    width: 60%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #C4961A, transparent);
    margin-bottom: 24px;
    opacity: 0.6;
  }

  .headline {
    font-family: 'Rye', serif;
    color: #C4961A;
    font-size: 58px;
    text-align: center;
    letter-spacing: 0.06em;
    line-height: 1.15;
    text-shadow: 0 2px 8px rgba(196,150,26,0.15);
    margin-bottom: 8px;
  }

  .sub-label {
    font-family: 'Special Elite', cursive;
    color: #6B6055;
    font-size: 16px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  /* Logo container */
  .logo-wrap {
    position: relative;
    margin-bottom: 24px;
  }
  .logo-wrap img {
    width: 280px;
    height: auto;
    filter: drop-shadow(0 0 30px rgba(196,150,26,0.15));
  }

  /* Buster the Ghost — actual SVG from the app */
  .buster-wrap {
    margin-bottom: 20px;
    position: relative;
  }
  .buster-wrap svg {
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  }

  /* Tagline */
  .tagline {
    font-family: 'Rye', serif;
    color: #EDE5D8;
    font-size: 52px;
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1.15;
    margin-bottom: 8px;
    text-shadow: 0 2px 12px rgba(196,150,26,0.1);
  }

  .sub-tagline {
    font-family: 'Special Elite', cursive;
    color: #C4961A;
    font-size: 32px;
    font-style: italic;
    text-align: center;
    opacity: 0.85;
    margin-bottom: 24px;
  }

  /* Bottom ornament */
  .ornament-bottom {
    width: 40%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #C4961A, transparent);
    opacity: 0.4;
    margin-top: 8px;
  }

  .est {
    font-family: 'Special Elite', cursive;
    color: #6B6055;
    font-size: 14px;
    letter-spacing: 0.5em;
    margin-top: 16px;
  }

  /* Decorative dots */
  .dots {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    align-items: center;
  }
  .dot {
    width: 4px;
    height: 4px;
    background: #C4961A;
    border-radius: 50%;
    opacity: 0.5;
  }
  .dot-line {
    width: 40px;
    height: 1px;
    background: #C4961A;
    opacity: 0.3;
  }
</style>
</head>
<body>

<div class="scratches">
  <div class="scratch scratch-1"></div>
  <div class="scratch scratch-2"></div>
  <div class="scratch scratch-3"></div>
  <div class="scratch scratch-4"></div>
  <div class="scratch scratch-5"></div>
</div>

<div class="corner-wear corner-wear--tl"></div>
<div class="corner-wear corner-wear--br"></div>
<div class="corner-wear corner-wear--tr"></div>
<div class="ink-stain"></div>

<div class="poster-content">
  <div class="ornament-top"></div>

  <div class="headline">THE REELHOUSE<br>SOCIETY</div>
  <div class="sub-label">EST. MMXXV · PRIVATE CINEMA SOCIETY</div>

  <!-- Actual official logo from the app -->
  <div class="logo-wrap">
    <img src="public/reelhouse-logo-full.png" alt="The ReelHouse Society Logo">
  </div>

  <!-- Actual official Buster SVG from the app — exact code from Buster.tsx -->
  <div class="buster-wrap">
    <svg viewBox="0 0 100 140" width="100" height="140" xmlns="http://www.w3.org/2000/svg">
      <!-- Ghostly body — wobbly bottom -->
      <path
        d="M 10 55 Q 10 10 50 10 Q 90 10 90 55 L 90 100 Q 82 90 74 100 Q 66 110 58 100 Q 50 90 42 100 Q 34 110 26 100 Q 18 90 10 100 Z"
        fill="#E8DFC8"
        opacity="0.92"
      />
      <!-- Ghostly glow -->
      <path
        d="M 10 55 Q 10 10 50 10 Q 90 10 90 55 L 90 100 Q 82 90 74 100 Q 66 110 58 100 Q 50 90 42 100 Q 34 110 26 100 Q 18 90 10 100 Z"
        fill="none"
        stroke="rgba(242,232,160,0.15)"
        stroke-width="3"
      />
      <!-- Eyes -->
      <ellipse cx="38" cy="52" rx="6" ry="7" fill="#0A0703" />
      <ellipse cx="62" cy="52" rx="6" ry="7" fill="#0A0703" />
      <!-- Pupils with gleam -->
      <circle cx="40" cy="50" r="2" fill="white" />
      <circle cx="64" cy="50" r="2" fill="white" />
      <!-- Mouth — too many teeth (peeking/sly mood) -->
      <path d="M 38 68 Q 50 76 62 66" stroke="#0A0703" stroke-width="2.5" fill="none" />
      <rect x="44" y="68" width="3" height="5" fill="#0A0703" rx="0.5" />
      <rect x="49" y="69" width="3" height="4" fill="#0A0703" rx="0.5" />
      <!-- Tiny crown for flair -->
      <path d="M 42 16 L 44 8 L 50 14 L 56 8 L 58 16 Z" fill="#8B6914" stroke="#F2E8A0" stroke-width="0.5" />
    </svg>
  </div>

  <div class="tagline">THE SOCIETY<br>IS WATCHING.</div>
  <div class="sub-tagline">Are you watching back?</div>

  <div class="ornament-bottom"></div>

  <div class="dots">
    <div class="dot-line"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot-line"></div>
  </div>

  <div class="est">REELHOUSE.APP</div>
</div>

</body>
</html>
