<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signal Lost | The ReelHouse Society</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0E0B08;
      color: #FAF3E0;
      font-family: 'Courier Prime', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* Film grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
    }
    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      opacity: 0.6;
      animation: flicker 3s infinite;
    }
    @keyframes flicker {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.3; }
      75% { opacity: 0.7; }
    }
    .section-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: #8B6914;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Courier Prime', 'Courier New', monospace;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: #FAF3E0;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      font-weight: 400;
    }
    .message {
      font-size: 0.85rem;
      color: #7A7268;
      line-height: 1.7;
      font-style: italic;
      max-width: 400px;
      margin: 0 auto 2rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.6rem 2rem;
      border: 1px solid rgba(139,105,20,0.4);
      background: transparent;
      color: #8B6914;
      font-family: 'Courier Prime', 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .retry-btn:hover {
      background: rgba(139,105,20,0.15);
      border-color: #8B6914;
    }
    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(139,105,20,0.3);
      animation: scan 4s linear infinite;
      z-index: 5;
    }
    @keyframes scan {
      0% { top: 0; }
      100% { top: 100vh; }
    }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <div class="container">
    <div class="icon">📡</div>
    <div class="section-label">✦ transmission interrupted ✦</div>
    <h1>The Signal Has Been Lost</h1>
    <p class="message">
      The archive is unreachable. Check your connection and try again — 
      the projection booth will be waiting.
    </p>
    <a href="/" class="retry-btn" onclick="window.location.reload(); return false;">
      Re-establish Connection
    </a>
  </div>
</body>
</html>
