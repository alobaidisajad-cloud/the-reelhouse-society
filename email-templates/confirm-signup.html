<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="x-apple-disable-message-reformatting">
  <title>Confirm your email</title>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;">
  <!-- Preheader — shows in inbox preview -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">
    Please confirm your email address to activate your account.
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;">
          <!-- Sender Identity -->
          <tr>
            <td style="padding-bottom:24px;">
              <strong style="font-size:16px;color:#1a1a1a;">The ReelHouse Society</strong>
            </td>
          </tr>
          <!-- Subject -->
          <tr>
            <td style="padding-bottom:16px;">
              <span style="font-size:20px;font-weight:600;color:#1a1a1a;">Confirm your email address</span>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding-bottom:24px;font-size:15px;color:#444;line-height:1.6;">
              Click the button below to verify your email and activate your account.
            </td>
          </tr>
          <!-- CTA -->
          <tr>
            <td style="padding-bottom:28px;">
              <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:12px 28px;background-color:#1a1a1a;color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;border-radius:6px;">Confirm email address</a>
            </td>
          </tr>
          <!-- Safety note -->
          <tr>
            <td style="padding-bottom:20px;font-size:13px;color:#888;line-height:1.5;">
              If you didn't create an account, you can safely ignore this email.
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="border-top:1px solid #eee;padding-top:16px;font-size:12px;color:#aaa;">
              The ReelHouse Society
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
