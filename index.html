<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Preconnect: establish DNS+TLS connections before any JS loads -->
  <link rel="preconnect" href="https://image.tmdb.org" crossorigin>
  <link rel="preconnect" href="https://api.themoviedb.org" crossorigin>
  <link rel="preconnect" href="https://wihyqkpoymwcvbprslyz.supabase.co" crossorigin>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64-micro.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <!-- Critical: prevents mobile zoom, enables proper scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description"
    content="The ReelHouse Society — Track, discover, and live cinema. Log movies, write reviews, discover screenings, and connect with a community of film lovers." />
  <meta name="theme-color" content="#0E0B08" />
  <!-- Mobile web app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="The ReelHouse Society" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- Tells iOS/Android not to detect phone numbers as links -->
  <meta name="format-detection" content="telephone=no" />

  <!-- Open Graph (Facebook, Discord, iMessage, etc.) -->
  <meta property="og:title" content="The ReelHouse Society — Track, Discover, and Live Cinema" />
  <meta property="og:description" content="Log films. Write critiques. Discover screenings. Join the society." />
  <meta property="og:image" content="https://thereelhousesociety.com/icon-512.png" />
  <meta property="og:url" content="https://thereelhousesociety.com" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="The ReelHouse Society" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The ReelHouse Society" />
  <meta name="twitter:description" content="Log films. Write critiques. Discover screenings. Join the society." />
  <meta name="twitter:image" content="https://thereelhousesociety.com/icon-512.png" />

  <title>The ReelHouse Society — Track, Discover, and Live Cinema</title>

  <!-- Font preconnect for faster DNS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Preload critical font CSS as async (non-render-blocking) for faster LCP -->
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'"
    href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Bungee&family=Bungee+Shade&display=swap" />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Bungee&family=Bungee+Shade&display=swap"
      rel="stylesheet" />
  </noscript>

  <!-- Critical inline CSS: prevents flash of unstyled background -->
  <style>
    html, body { background: #0E0B08; margin: 0; padding: 0; }
    #root { min-height: 100dvh; }
    @keyframes _rh-spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div id="root">
    <!-- Static shell: paints INSTANTLY before React hydrates, giving sub-1s FCP -->
    <div id="static-shell" style="min-height:100dvh;background:#0E0B08;color:#C4B898">
      <nav style="height:56px;background:#0A0703;border-bottom:1px solid rgba(139,105,20,0.15);display:flex;align-items:center;padding:0 1.5rem">
        <span style="font-family:Georgia,serif;font-size:1.1rem;color:#8B6914;letter-spacing:0.15em">REELHOUSE</span>
      </nav>
      <div style="display:flex;align-items:center;justify-content:center;min-height:80vh">
        <div style="text-align:center;opacity:0.4">
          <div style="width:50px;height:50px;border:2px solid #8B6914;border-top-color:transparent;border-radius:50%;animation:_rh-spin 1s linear infinite;margin:0 auto"></div>
          <div style="margin-top:1.5rem;font-family:monospace;font-size:0.6rem;letter-spacing:0.3em;color:#8B6914">LOADING REEL</div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister();
          }
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).catch((error) => {
            console.error('ServiceWorker registration failed: ', error);
          });
        });
      });
    }
  </script>
</body>

</html>
